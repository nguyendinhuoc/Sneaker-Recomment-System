name: Sneaker AI Pipeline

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Tải code về máy chủ
        uses: actions/checkout@v3

      - name: 🐍 Cài đặt Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Cài đặt thư viện
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔄 Chạy ETL Nạp dữ liệu Silver từ S3 lên Postgres
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python src/scripts/load_silver_to_postgres.py

      - name: 🧱 Build product features từ Neon
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python src/features/feature_engineering.py

      - name: 👤 Build user profiles từ Neon
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python src/features/user_profile.py

      - name: 🧠 Train item similarity từ interaction thật trên Neon
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python src/train_item_similarity_from_db.py